  - id: five-step-dev
    title: Graded Five-Step Development
    title_zh_cn: 分级五步开发法
    summary: Risk-graded Research→Plan→Implement→Review→Verify workflow for business-minded developers who control quality via plan approval and evidence-based verification instead of line-by-line code review, with model-switch reminders to keep top-tier model usage on high-stakes decision points only.
